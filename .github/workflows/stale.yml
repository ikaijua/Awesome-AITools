name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean up stale cache
        run: rm -rf ./_state

      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issue configuration: Mark stale after 7 days, close after 3 more days (10 days total inactivity)
          # > 7d inactive → mark stale; > 10d inactive → close automatically
          # (7 days to mark + 3 days after marking = 10 days total from last activity)
          stale-issue-message: 'This issue has been inactive for 7 days. It will be closed in 3 days if there is no activity.'
          close-issue-message: 'This issue has been closed due to inactivity for 10 days. Feel free to reopen if there are updates.'
          days-before-issue-stale: 7
          days-before-issue-close: 3

          # PR configuration: Mark stale after 7 days, close after 3 more days (10 days total inactivity)
          # > 7d inactive → mark stale; > 10d inactive → close automatically
          # (7 days to mark + 3 days after marking = 10 days total from last activity)
          stale-pr-message: 'This PR has been inactive for 7 days. It will be closed in 3 days if there is no activity.'
          close-pr-message: 'This PR has been closed due to inactivity for 10 days. Feel free to reopen if there are updates.'
          days-before-pr-stale: 7
          days-before-pr-close: 3

          # Exempt items with the 'exempt-stale' label
          exempt-issue-labels: 'exempt-stale'
          exempt-pr-labels: 'exempt-stale'

          # Other configurations
          remove-stale-when-updated: true
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          operations-per-run: 300
          ascending: true
